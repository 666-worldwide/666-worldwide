<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register — 666 WORLDWIDE</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="site-header">
  <nav class="nav container">
    <a class="brand" href="/index.html"><span class="glyph">&#9760;</span> 666 WORLDWIDE</a>
    <button class="nav-toggle" aria-label="Toggle navigation">MENU</button>
    <ul class="nav-links">
      <li><a href="/index.html">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/mission.html">Mission</a></li>
      <li><a href="/join.html">Join</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><a href="/login.html">Login</a></li>
      <li data-auth-slot></li>
    </ul>
  </nav>
</header>

<main>
  <section style="padding-top: 4rem;">
    <div class="container form-shell">
      <p class="eyebrow" style="text-align:center;">Registration</p>
      <h1>Claim your number.</h1>
      <div id="alert" class="alert alert-error"></div>
      <form id="register-form" novalidate>
        <div class="field">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" autocomplete="name" required minlength="2" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Register</button>
      </form>
      <p class="form-footnote">Already a member? <a href="/login.html">Login here</a></p>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-row">
    <span>&copy; <span id="year"></span> 666 WORLDWIDE</span>
    <span><a href="/about.html">About</a> &middot; <a href="/contact.html">Contact</a> &middot; <a href="/join.html">Join</a></span>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  if (Auth.isAuthenticated()) {
    window.location.href = '/dashboard.html';
  }

  const form = document.getElementById('register-form');
  const alertBox = document.getElementById('alert');
  const submitBtn = document.getElementById('submit-btn');

  function showAlert(message) {
    alertBox.textContent = message;
    alertBox.classList.add('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.classList.remove('visible');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Registering…';

    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const data = await apiRequest('/auth/register', {
        method: 'POST',
        body: { fullName, email, password }
      });
      Auth.setToken(data.token);
      window.location.href = '/dashboard.html';
    } catch (err) {
      showAlert(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Register';
    }
  });
</script>
</body>
</html>
