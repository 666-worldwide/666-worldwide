<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — 666 WORLDWIDE</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="site-header">
  <nav class="nav container">
    <a class="brand" href="/index.html"><span class="glyph">&#9760;</span> 666 WORLDWIDE</a>
    <button class="nav-toggle" aria-label="Toggle navigation">MENU</button>
    <ul class="nav-links">
      <li><a href="/index.html">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/mission.html">Mission</a></li>
      <li><a href="/join.html">Join</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><a href="/login.html">Login</a></li>
      <li data-auth-slot></li>
    </ul>
  </nav>
</header>

<main>
  <section class="hero" style="padding-bottom: 2rem;">
    <div class="container hero-inner">
      <p class="eyebrow">Get In Touch</p>
      <h1>Reach an agent directly.</h1>
      <p class="lede">There is no support ticket queue. Contact an active agent below, or reach the
        registry directly for account matters.</p>
    </div>
  </section>

  <div class="divider"></div>

  <section>
    <div class="container">
      <div id="agent-contact" class="grid grid-3">
        <p style="color: var(--bone-dim); font-family: var(--font-mono); font-size: 0.85rem;">Loading agents…</p>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-row">
    <span>&copy; <span id="year"></span> 666 WORLDWIDE</span>
    <span><a href="/about.html">About</a> &middot; <a href="/contact.html">Contact</a> &middot; <a href="/join.html">Join</a></span>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  fetch('/api/agents')
    .then((r) => r.json())
    .then(({ agents }) => {
      const wrap = document.getElementById('agent-contact');
      wrap.innerHTML = '';
      agents.forEach((agent) => {
        const card = document.createElement('div');
        card.className = 'card agent-card';
        card.innerHTML = `
          <span class="agent-status">${agent.status}</span>
          <h3>${agent.name}</h3>
          <span class="agent-phone">${agent.phone}</span>
        `;
        wrap.appendChild(card);
      });
    })
    .catch(() => {
      document.getElementById('agent-contact').innerHTML =
        '<p style="color: var(--bone-dim);">Agent registry temporarily unavailable.</p>';
    });
</script>
</body>
</html>
